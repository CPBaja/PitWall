<div class="flex flex-col h-full overflow-hidden">
  <div
    class="grid border-b border-line-subtle px-3 py-1.5 text-xs tracking-widest text-subtle uppercase shrink-0"
    [style]="gridStyle()"
  >
    <span>Car</span>
    <span>Team</span>
    @for (col of columns(); track col.key) {
      <span class="text-right">{{ col.label }}</span>
    }
  </div>

  <div class="flex-1 overflow-y-auto min-h-0">
    @for (row of visibleRows; track rowKey(row)) {
      <div
        (click)="carClick.emit(row.score?.carNumber ?? 0)"
        class="grid cursor-pointer items-center border-b border-line-subtle px-3 py-1 text-xs transition-colors"
        [style]="gridStyle()"
        [class]="rowClass(+(row.score?.carNumber ?? 0))"
      >
        <span
          [class]="
            isMyCar(row.score?.carNumber ?? 0)
              ? 'text-accent font-medium'
              : 'text-fg-soft'
          "
        >
          {{ row.score?.carNumber }}
        </span>
        <span class="truncate text-muted">{{ row.car?.teamName ?? '—' }}</span>
        @for (col of columns(); track col.key) {
          <span class="text-right tabular-nums" [class]="cellClass(col, row)">
            {{ fmtCell(col.getValue(row), col) }}
          </span>
        }
      </div>
    }
  </div>

</div>
