<div class="flex items-center gap-2 mb-2">
  <span class="w-16 text-xs text-muted shrink-0">
    {{ label() }} <span class="text-faint">{{ hint() }}</span>
  </span>

  <input
    type="number"
    class="flex-1 rounded border bg-panel px-2 py-1 text-right text-xs transition-colors focus:outline-none [appearance:textfield] [&::-webkit-inner-spin-button]:appearance-none [&::-webkit-outer-spin-button]:appearance-none"
    [class]="
      overrideValue() != null
        ? 'border-accent-line text-accent focus:border-accent'
        : 'border-input text-fg focus:border-input-hover'
    "
    [placeholder]="liveValue() != null ? liveValue()!.toString() : '—'"
    [(ngModel)]="overrideValue"
  />

  @if (overrideValue() != null) {
    <button
      (click)="reset.emit()"
      class="w-10 text-right text-xs text-subtle transition-colors shrink-0 hover:text-accent"
    >
      {{ liveValue() ?? '—' }} ↺
    </button>
  } @else {
    <span class="w-10 text-right text-xs text-faint shrink-0">live</span>
  }
</div>
