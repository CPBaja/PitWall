<div class="flex flex-1 min-h-0 overflow-hidden bg-canvas text-fg font-mono">
  <!-- Left: overall leaderboard -->
  <div class="flex min-h-0 flex-col overflow-hidden border-r border-line" [style]="leftWidth()">
    <div class="flex items-center justify-between border-b border-line px-3 py-1.5 shrink-0">
      <span class="text-xs tracking-widest text-muted uppercase">Overall Static</span>
      <span class="text-xs text-subtle">{{ scores().length }} cars</span>
    </div>
    <pw-pinned-leaderboard
      [scores]="scores()"
      [carMap]="carMap()"
      [myCarNumber]="myCarNumber()"
      [selectedCar]="selectedCar()"
      [columns]="staticColumns"
      (carClick)="onCarClick($event)"
    />
  </div>

  <!-- Right: event tables -->
  <div
    class="flex flex-1 min-w-0 min-h-0 flex-col overflow-hidden border-r border-line"
    [class]="selectedCar() ? 'hidden xl:flex' : 'flex'"
  >
    <!-- Design -->
    <div class="flex flex-1 min-h-0 flex-col overflow-hidden border-b border-line">
      <div class="flex items-center justify-between border-b border-line px-3 py-1.5 shrink-0">
        <span class="text-xs tracking-widest text-muted uppercase">Design</span>
        <span class="text-xs text-subtle">all · of 150</span>
      </div>
      <pw-event-table
        [rows]="designRows()"
        [columns]="designColumns"
        [myCarNumber]="myCarNumber()"
        [selectedCar]="selectedCar()"
        (carClick)="onCarClick($event)"
      />
    </div>

    <!-- Cost -->
    <div class="flex flex-1 min-h-0 flex-col overflow-hidden border-b border-line">
      <div class="flex items-center justify-between border-b border-line px-3 py-1.5 shrink-0">
        <span class="text-xs tracking-widest text-muted uppercase">Cost</span>
        <span class="text-xs text-subtle">top 10 · of 100</span>
      </div>
      <pw-event-table
        [rows]="costRows()"
        [columns]="costColumns"
        [myCarNumber]="myCarNumber()"
        [selectedCar]="selectedCar()"
        (carClick)="onCarClick($event)"
      />
    </div>

    <!-- BP -->
    <div class="flex flex-1 min-h-0 flex-col overflow-hidden">
      <div class="flex items-center justify-between border-b border-line px-3 py-1.5 shrink-0">
        <span class="text-xs tracking-widest text-muted uppercase">Business Presentation</span>
        <span class="text-xs text-subtle">all · of 70</span>
      </div>
      <pw-event-table
        [rows]="bpRows()"
        [columns]="bpColumns"
        [myCarNumber]="myCarNumber()"
        [selectedCar]="selectedCar()"
        (carClick)="onCarClick($event)"
      />
    </div>
  </div>

  <!-- Car panel -->
  @if (selectedCar()) {
    <pw-car-panel [carNumber]="selectedCar()!" (close)="selectedCar.set(null)" />
  }
</div>
